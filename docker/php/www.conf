[www]
user = www
group = www

listen = /run/php/php-fpm.sock
listen.owner = www
listen.group = www
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Keep the real container environment (Coolify env vars) visible to workers.
clear_env = no

catch_workers_output = yes
decorate_workers_output = no

php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
